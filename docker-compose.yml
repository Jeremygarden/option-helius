services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://postgres:postgres@timescaledb:5432/postgres
      - FLASHALPHA_API_KEY=${FLASHALPHA_API_KEY:-kA3RN78I4T1lE1EyOyHiH9yfJs2QdX9HQuCQeOM5}
      - ALPHAVANTAGE_API_KEY=${ALPHAVANTAGE_API_KEY:-4ZVBTAERBE2N4AUG}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ibgateway:
    image: ghcr.io/extrange/ibkr:stable
    container_name: ibgateway
    restart: unless-stopped
    environment:
      - IBKR_USERNAME=${IBKR_USERNAME:-}
      - IBKR_PASSWORD=${IBKR_PASSWORD:-}
      - TRADING_MODE=${TRADING_MODE:-PAPER}
      - TWS_VERSION=${TWS_VERSION:-1019}
      - IBC_VERSION=${IBC_VERSION:-3.18.0}
      - TZ=${TZ:-America/New_York}
      - VNC_PASSWORD=${VNC_PASSWORD:-changeme123}
    ports:
      - "${PAPER_PORT:-4002}:4002"
      - "${VNC_PORT:-6080}:6080"
    volumes:
      - ibgateway-settings:/home/ibgateway/.java
      - ibgateway-ibc:/home/ibgateway/ibc
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ibgateway-settings:
  ibgateway-ibc:
