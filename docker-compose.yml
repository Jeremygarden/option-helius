services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgres://postgres:postgres@timescaledb:5432/postgres
      - FLASHALPHA_API_KEY=${FLASHALPHA_API_KEY:-kA3RN78I4T1lE1EyOyHiH9yfJs2QdX9HQuCQeOM5}
      - ALPHAVANTAGE_API_KEY=${ALPHAVANTAGE_API_KEY:-4ZVBTAERBE2N4AUG}
      - IBKR_ENABLED=${IBKR_ENABLED:-false}
      - IBKR_HOST=${IBKR_HOST:-localhost}
      - IBKR_PORT=${IBKR_PORT:-4002}
      - IBKR_CLIENT_ID=${IBKR_CLIENT_ID:-1}
      - IBKR_ACCOUNT_TYPE=${IBKR_ACCOUNT_TYPE:-paper}
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - option-helius-net

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - option-helius-net

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - option-helius-net

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - option-helius-net

networks:
  option-helius-net:
    driver: bridge
