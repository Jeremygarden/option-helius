# Optional local override loaded automatically by `docker compose`.
# The ibgateway service is behind the `ibkr` profile, so default `docker compose up`
# still starts only the base application. Use:
#   docker compose --profile ibkr up -d
# or set COMPOSE_PROFILES=ibkr in .env.

services:
  backend:
    depends_on:
      ibgateway:
        condition: service_started
        required: false

  ibgateway:
    profiles:
      - ibkr
    build:
      context: ./infra/ibkr
    image: option-helius-ibgateway:latest
    container_name: ibgateway
    restart: unless-stopped
    init: true
    environment:
      - IBKR_USERNAME=${IBKR_USERNAME:-}
      - IBKR_PASSWORD=${IBKR_PASSWORD:-}
      - TRADING_MODE=${TRADING_MODE:-PAPER}
      - TWS_VERSION=${TWS_VERSION:-1019}
      - IBC_VERSION=${IBC_VERSION:-3.18.0}
      - TZ=${TZ:-America/New_York}
      - VNC_PASSWORD=${VNC_PASSWORD:-changeme123}
    ports:
      - "127.0.0.1:${PAPER_PORT:-4002}:4002"
      - "127.0.0.1:${VNC_PORT:-6080}:6080"
    volumes:
      - ibgateway-settings:/home/ibgateway/.java
      - ibgateway-ibc:/home/ibgateway/ibc
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4002 || nc -z localhost 4001"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - option-helius-net
    mem_limit: 2g
    cpus: "1.00"
    pids_limit: 512
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ibgateway-settings:
  ibgateway-ibc:
